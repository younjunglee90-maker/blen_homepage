<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blen</title>
    <link rel="stylesheet" href="../../../styles.css" />
  </head>
  <body data-page="about" data-locale="en">
    <header class="site-header">
      <div class="site-header__inner">
        <a class="site-brand" href="/en" aria-label="Blen Home">Blen</a>

        <button
          type="button"
          class="site-nav-toggle"
          aria-expanded="false"
          aria-controls="primary-nav"
          data-i18n-attr="aria-label"
          data-i18n-key="common.menuToggle"
        >
          <span></span>
          <span></span>
          <span></span>
        </button>

        <nav
          id="primary-nav"
          class="site-nav"
          aria-label="Primary navigation"
          data-i18n-attr="aria-label"
          data-i18n-key="common.navAria"
        >
          <ul class="site-nav__list">
            <li><a class="site-nav__link" data-nav="home" href="/en" data-i18n="common.navHome"></a></li>
            <li><a class="site-nav__link" data-nav="about" href="/en/about" data-i18n="common.navAbout"></a></li>
            <li><a class="site-nav__link" data-nav="support" href="/en/support" data-i18n="common.navSupport"></a></li>
          </ul>
          <div
            class="site-lang"
            role="group"
            aria-label="Language selector"
            data-i18n-attr="aria-label"
            data-i18n-key="common.languageAria"
          >
            <button type="button" class="site-lang__btn" data-set-lang="en" aria-pressed="false" data-i18n="common.langEng"></button>
            <button type="button" class="site-lang__btn" data-set-lang="ko" aria-pressed="false" data-i18n="common.langKo"></button>
          </div>
        </nav>
      </div>
    </header>

<main class="content-page">
      <article class="content-card">
        <h1 class="content-page__title" data-i18n="about.title"></h1>

        <p class="content-page__text" data-i18n="about.description"></p>

        <section class="content-page__section">
          <h2 class="content-page__heading" data-i18n="about.missionTitle"></h2>
          <p class="content-page__text" data-i18n="about.missionIntro"></p>
          <p class="content-page__text" data-i18n="about.missionBody"></p>
        </section>

        <section class="content-page__section">
          <h2 class="content-page__heading" data-i18n="about.whatWeDoTitle"></h2>
          <p class="content-page__text" data-i18n="about.whatWeDoBody"></p>
          <p class="content-page__text" data-i18n="about.serviceIncludesTitle"></p>
          <ul class="content-list">
            <li data-i18n="about.serviceIncludes.analysis"></li>
            <li data-i18n="about.serviceIncludes.compatibility"></li>
            <li data-i18n="about.serviceIncludes.recommendations"></li>
            <li data-i18n="about.serviceIncludes.experience"></li>
          </ul>
        </section>

        <section class="content-page__section">
          <h2 class="content-page__heading" data-i18n="about.approachTitle"></h2>
          <p class="content-page__text" data-i18n="about.approachIntro"></p>
          <p class="content-page__text" data-i18n="about.prioritizeTitle"></p>
          <ul class="content-list">
            <li data-i18n="about.priorities.valuesGoals"></li>
            <li data-i18n="about.priorities.emotional"></li>
            <li data-i18n="about.priorities.lifestyle"></li>
          </ul>
          <p class="content-page__text" data-i18n="about.approachGoal"></p>
        </section>

        <section class="content-page__section">
          <h2 class="content-page__heading" data-i18n="about.importantNoteTitle"></h2>
          <p class="content-note" data-i18n="about.importantNoteBody"></p>
        </section>

        <section class="content-page__section">
          <h2 class="content-page__heading" data-i18n="about.contactTitle"></h2>
          <p class="content-page__text">
            <a class="content-page__email" href="mailto:hello@blenmatch.com" data-i18n="about.contactEmail"></a>
          </p>
        </section>
      </article>
    </main>
    <footer class="site-footer">
      <div class="site-footer__inner">
        <ul class="footer-nav" aria-label="Footer Menu">
          <li><a class="footer-nav__link" data-footer-link="about" data-i18n="common.footerAbout" href="../about/"></a></li>
          <li><a class="footer-nav__link" data-footer-link="terms" data-i18n="common.footerTerms" href="../terms/"></a></li>
          <li><a class="footer-nav__link" data-footer-link="privacy" data-i18n="common.footerPrivacy" href="../privacy/"></a></li>
          <li><a class="footer-nav__link" data-footer-link="support" data-i18n="common.footerSupport" href="../support/"></a></li>
        </ul>
        <p class="site-footer__text" data-i18n="common.copyright"></p>
      </div>
    </footer>
    <script src="../../../script.js"></script>
  </body>
</html>
