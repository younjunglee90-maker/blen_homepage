<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blen</title>
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body data-page="home" data-locale="en">
    <header class="site-header">
      <div class="site-header__inner">
        <a class="site-brand" href="/en" aria-label="Blen Home">Blen</a>

        <button
          type="button"
          class="site-nav-toggle"
          aria-expanded="false"
          aria-controls="primary-nav"
          data-i18n-attr="aria-label"
          data-i18n-key="common.menuToggle"
        >
          <span></span>
          <span></span>
          <span></span>
        </button>

        <nav
          id="primary-nav"
          class="site-nav"
          aria-label="Primary navigation"
          data-i18n-attr="aria-label"
          data-i18n-key="common.navAria"
        >
          <ul class="site-nav__list">
            <li><a class="site-nav__link" data-nav="home" href="/en" data-i18n="common.navHome"></a></li>
            <li><a class="site-nav__link" data-nav="about" href="/en/about" data-i18n="common.navAbout"></a></li>
            <li><a class="site-nav__link" data-nav="support" href="/en/support" data-i18n="common.navSupport"></a></li>
          </ul>
          <div
            class="site-lang"
            role="group"
            aria-label="Language selector"
            data-i18n-attr="aria-label"
            data-i18n-key="common.languageAria"
          >
            <button type="button" class="site-lang__btn" data-set-lang="en" aria-pressed="false" data-i18n="common.langEng"></button>
            <button type="button" class="site-lang__btn" data-set-lang="ko" aria-pressed="false" data-i18n="common.langKo"></button>
          </div>
        </nav>
      </div>
    </header>

<main class="page">
      <section class="hero" aria-label="Blen introduction" data-i18n-attr="aria-label" data-i18n-key="home.heroAria">
        <div class="hero__visual">
          <img class="hero__art" src="../assets/right-image.svg" alt="Blen illustration" data-i18n-attr="alt" data-i18n-key="home.heroAlt" />
          <p class="hero__overlay-text">Not many. Just the right one.</p>
        </div>

        <div class="hero__content">
          <div class="hero__left">
            <h1 class="hero__title" data-i18n="home.title"></h1>
            <p class="hero__subtitle">
              <span data-i18n="home.subtitleLine1"></span>
              <span class="hero__subtitle-line2" data-i18n="home.subtitleLine2"></span>
            </p>

            <div class="hero__actions hero__actions--desktop" role="group" aria-label="Download links" data-i18n-attr="aria-label" data-i18n-key="home.downloadAria"><a class="btn btn--android store-link" data-store="android" href="#" target="_blank" rel="noopener" data-i18n="home.android"></a>
              <a class="btn btn--ios store-link" data-store="ios" href="#" target="_blank" rel="noopener" data-i18n="home.ios"></a>
            </div>
          </div>
        </div>

        <div class="hero__actions hero__actions--mobile" role="group" aria-label="Download links" data-i18n-attr="aria-label" data-i18n-key="home.downloadAria"><a class="btn btn--android store-link" data-store="android" href="#" target="_blank" rel="noopener" data-i18n="home.android"></a>
          <a class="btn btn--ios store-link" data-store="ios" href="#" target="_blank" rel="noopener" data-i18n="home.ios"></a>
        </div>
      </section>
    </main>
    <footer class="site-footer">
      <div class="site-footer__inner">
        <ul class="footer-nav" aria-label="Footer Menu">
          <li><a class="footer-nav__link" data-footer-link="about" data-i18n="common.footerAbout" href="./about/"></a></li>
          <li><a class="footer-nav__link" data-footer-link="terms" data-i18n="common.footerTerms" href="./terms/"></a></li>
          <li><a class="footer-nav__link" data-footer-link="privacy" data-i18n="common.footerPrivacy" href="./privacy/"></a></li>
          <li><a class="footer-nav__link" data-footer-link="support" data-i18n="common.footerSupport" href="./support/"></a></li>
        </ul>
        <p class="site-footer__text" data-i18n="common.copyright"></p>
      </div>
    </footer>
    <script src="../script.js"></script>
  </body>
</html>
