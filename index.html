<!doctype html>
<html lang="en">
  <head>
    <!-- Meta -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Title -->
    <title>Blen</title>

    <!-- Styles -->
    <link rel="stylesheet" href="../../../styles.css" />
  </head>

  <body data-page="about" data-locale="en">
    <!-- ================= HEADER ================= -->
    <header class="site-header">
      <div class="site-header__inner">
        <!-- Logo -->
        <a class="site-brand" href="/en" aria-label="Blen Home">Blen</a>

        <!-- Mobile Menu Toggle -->
        <button
          type="button"
          class="site-nav-toggle"
          aria-expanded="false"
          aria-controls="primary-nav"
          data-i18n-attr="aria-label"
          data-i18n-key="common.menuToggle"
        >
          <span></span>
          <span></span>
          <span></span>
        </button>

        <!-- Navigation -->
        <nav
          id="primary-nav"
          class="site-nav"
          aria-label="Primary navigation"
          data-i18n-attr="aria-label"
          data-i18n-key="common.navAria"
        >
          <ul class="site-nav__list">
            <li>
              <a
                class="site-nav__link"
                href="/en"
                data-nav="home"
                data-i18n="common.navHome"
              ></a>
            </li>
            <li>
              <a
                class="site-nav__link"
                href="/en/about"
                data-nav="about"
                data-i18n="common.navAbout"
              ></a>
            </li>
            <li>
              <a
                class="site-nav__link"
                href="https://www.blenmatch.com/en/relationship-test/"
                data-nav="service"
                data-i18n="common.navService"
              ></a>
            </li>
            <li>
              <a
                class="site-nav__link"
                href="/en/support"
                data-nav="support"
                data-i18n="common.navSupport"
              ></a>
            </li>
          </ul>
        </nav>

        <!-- Language Selector -->
        <div
          class="site-lang"
          role="group"
          aria-label="Language selector"
          data-i18n-attr="aria-label"
          data-i18n-key="common.languageAria"
        >
          <button
            type="button"
            class="site-lang__trigger"
            aria-expanded="false"
            aria-controls="language-menu"
          >
            <span class="site-lang__icon">🌐</span>
            <span class="site-lang__current" data-lang-current>English</span>
            <span class="site-lang__chevron">▾</span>
          </button>

          <div id="language-menu" class="site-lang__menu" role="menu">
            <button
              class="site-lang__btn"
              data-set-lang="en"
              role="menuitemradio"
              data-i18n="common.langEng"
            ></button>
            <button
              class="site-lang__btn"
              data-set-lang="ko"
              role="menuitemradio"
              data-i18n="common.langKo"
            ></button>
          </div>
        </div>
      </div>
    </header>

    <!-- ================= MAIN ================= -->
    <main class="content-page">
      <article class="content-card">
        <!-- Title -->
        <h1 class="content-page__title" data-i18n="about.title"></h1>

        <!-- Description -->
        <p class="content-page__text" data-i18n="about.description"></p>

        <!-- Mission -->
        <section class="content-page__section">
          <h2 class="content-page__heading" data-i18n="about.missionTitle"></h2>
          <p class="content-page__text" data-i18n="about.missionIntro"></p>
          <p class="content-page__text" data-i18n="about.missionBody"></p>
        </section>

        <!-- What We Do -->
        <section class="content-page__section">
          <h2
            class="content-page__heading"
            data-i18n="about.whatWeDoTitle"
          ></h2>
          <p class="content-page__text" data-i18n="about.whatWeDoBody"></p>

          <ul class="content-list">
            <li data-i18n="about.serviceIncludes.analysis"></li>
            <li data-i18n="about.serviceIncludes.compatibility"></li>
            <li data-i18n="about.serviceIncludes.recommendations"></li>
            <li data-i18n="about.serviceIncludes.experience"></li>
          </ul>
        </section>

        <!-- Approach -->
        <section class="content-page__section">
          <h2
            class="content-page__heading"
            data-i18n="about.approachTitle"
          ></h2>
          <p class="content-page__text" data-i18n="about.approachIntro"></p>

          <ul class="content-list">
            <li data-i18n="about.priorities.valuesGoals"></li>
            <li data-i18n="about.priorities.emotional"></li>
            <li data-i18n="about.priorities.lifestyle"></li>
          </ul>

          <p class="content-page__text" data-i18n="about.approachGoal"></p>
        </section>

        <!-- Important Note -->
        <section class="content-page__section">
          <h2
            class="content-page__heading"
            data-i18n="about.importantNoteTitle"
          ></h2>
          <p class="content-note" data-i18n="about.importantNoteBody"></p>
        </section>

        <!-- Contact -->
        <section class="content-page__section">
          <h2 class="content-page__heading" data-i18n="about.contactTitle"></h2>
          <p>
            <a
              href="mailto:hello@blenmatch.com"
              class="content-page__email"
              data-i18n="about.contactEmail"
            ></a>
          </p>
        </section>
      </article>
    </main>

    <!-- ================= FOOTER ================= -->
    <footer class="site-footer">
      <div class="site-footer__inner">
        <ul class="footer-nav">
          <li><a href="../about/" data-i18n="common.footerAbout"></a></li>
          <li><a href="../terms/" data-i18n="common.footerTerms"></a></li>
          <li><a href="../privacy/" data-i18n="common.footerPrivacy"></a></li>
          <li><a href="../support/" data-i18n="common.footerSupport"></a></li>
        </ul>

        <p class="site-footer__text" data-i18n="common.copyright"></p>
      </div>
    </footer>

    <!-- Scripts -->
    <script src="../../../script.js"></script>
  </body>
</html>
