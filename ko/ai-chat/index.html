<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blen</title>
    <link rel="stylesheet" href="../../../styles.css" />
  </head>
  <body data-page="aiChat" data-locale="ko">
    <header class="site-header">
      <div class="site-header__inner">
        <a class="site-brand" href="/ko" aria-label="Blen Home">Blen</a>

        <button
          type="button"
          class="site-nav-toggle"
          aria-expanded="false"
          aria-controls="primary-nav"
          data-i18n-attr="aria-label"
          data-i18n-key="common.menuToggle"
        >
          <span></span>
          <span></span>
          <span></span>
        </button>

        <nav
          id="primary-nav"
          class="site-nav"
          aria-label="Primary navigation"
          data-i18n-attr="aria-label"
          data-i18n-key="common.navAria"
        >
          <ul class="site-nav__list">
            <li><a class="site-nav__link" data-nav="home" href="/ko" data-i18n="common.navHome"></a></li>
            <li><a class="site-nav__link" data-nav="about" href="/ko/about" data-i18n="common.navAbout"></a></li>
            <li><a class="site-nav__link" data-nav="support" href="/ko/support" data-i18n="common.navSupport"></a></li>
          </ul>
        </nav>
        <div
          class="site-lang"
          role="group"
          aria-label="Language selector"
          data-i18n-attr="aria-label"
          data-i18n-key="common.languageAria"
        >
          <button
            type="button"
            class="site-lang__trigger"
            aria-expanded="false"
            aria-controls="language-menu"
            data-i18n-attr="aria-label"
            data-i18n-key="common.languageAria"
          >
            <span class="site-lang__icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2Zm6.92 9h-3.03c-.2-2.18-.98-4.11-2.1-5.46A8.04 8.04 0 0 1 18.92 11ZM12 4.04c1.39 1.48 2.34 3.98 2.55 6.96H9.45c.21-2.98 1.16-5.48 2.55-6.96ZM4.26 13h3.03c.2 2.18.98 4.11 2.1 5.46A8.04 8.04 0 0 1 4.26 13Zm3.03-2H4.26a8.04 8.04 0 0 1 5.13-5.46C8.27 6.89 7.49 8.82 7.29 11Zm4.71 8.96c-1.39-1.48-2.34-3.98-2.55-6.96h5.1c-.21 2.98-1.16 5.48-2.55 6.96ZM14.61 18.46c1.12-1.35 1.9-3.28 2.1-5.46h3.03a8.04 8.04 0 0 1-5.13 5.46Z" fill="currentColor"/>
              </svg>
            </span>
            <span class="site-lang__current" data-lang-current>English</span>
            <span class="site-lang__chevron" aria-hidden="true">▾</span>
          </button>
          <div id="language-menu" class="site-lang__menu" role="menu">
            <button
              type="button"
              class="site-lang__btn"
              data-set-lang="en"
              aria-pressed="false"
              role="menuitemradio"
              data-i18n="common.langEng"
            ></button>
            <button
              type="button"
              class="site-lang__btn"
              data-set-lang="ko"
              aria-pressed="false"
              role="menuitemradio"
              data-i18n="common.langKo"
            ></button>
          </div>
        </div>
      </div>
    </header>
    <main class="ai-chat">
      <header class="ai-chat__header">
        <h1 class="ai-chat__title" data-i18n="aiChat.title"></h1>
        <p class="ai-chat__subtitle" data-i18n="aiChat.subtitle"></p>
      </header>

      <section class="ai-chat__messages" aria-label="AI conversation"></section>

      <form class="ai-chat__input-wrap" action="javascript:void(0)">
        <input class="ai-chat__input" type="text" data-i18n-attr="placeholder" data-i18n-key="aiChat.inputPlaceholder" />
        <button class="ai-chat__send" type="submit" data-i18n="aiChat.send"></button>
      </form>
    </main>
    <div class="login-modal" data-login-modal hidden>
      <section class="login-modal__panel" role="dialog" aria-modal="true" aria-labelledby="loginModalTitle">
        <button type="button" class="login-modal__close" data-login-modal-close aria-label="Close">×</button>
        <h2 id="loginModalTitle" class="login-modal__title" data-i18n="login.modalTitle"></h2>
        <form class="login-modal__form" data-login-otp-form>
          <label class="login-modal__label" for="chatFullName" data-i18n="login.fullNameLabel"></label>
          <input
            id="chatFullName"
            class="login-modal__input"
            type="text"
            data-login-input="name"
            data-i18n-attr="placeholder"
            data-i18n-key="login.fullNamePlaceholder"
          />
          <label class="login-modal__label" for="chatLoginEmail" data-i18n="login.emailLabel"></label>
          <input
            id="chatLoginEmail"
            class="login-modal__input"
            type="email"
            data-login-input="email"
            data-i18n-attr="placeholder"
            data-i18n-key="login.emailPlaceholder"
          />
          <label class="login-modal__checkbox">
            <input type="checkbox" data-login-offers />
            <span data-i18n="login.offers"></span>
          </label>
          <button type="submit" class="login-modal__submit" data-i18n="login.submit"></button>
        </form>
        <p class="login-modal__divider"><span data-i18n="login.or"></span></p>
        <div class="login-modal__socials" aria-label="Social login options">
          <button type="button" class="login-modal__social-btn" data-login-provider="google" aria-label="Google">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path fill="#EA4335" d="M12 10.2v3.9h5.48c-.24 1.26-.95 2.33-2.01 3.04l3.25 2.52c1.9-1.75 2.98-4.31 2.98-7.35 0-.71-.06-1.39-.18-2.05H12z"/>
              <path fill="#34A853" d="M12 22c2.7 0 4.97-.9 6.62-2.45l-3.25-2.52c-.9.61-2.05.98-3.37.98-2.59 0-4.78-1.74-5.56-4.08H3.08v2.57A9.99 9.99 0 0 0 12 22z"/>
              <path fill="#4A90E2" d="M6.44 13.93A6 6 0 0 1 6.13 12c0-.67.12-1.31.31-1.93V7.5H3.08A9.99 9.99 0 0 0 2 12c0 1.61.39 3.14 1.08 4.5l3.36-2.57z"/>
              <path fill="#FBBC05" d="M12 5.99c1.47 0 2.79.51 3.83 1.51l2.87-2.87A9.59 9.59 0 0 0 12 2 9.99 9.99 0 0 0 3.08 7.5l3.36 2.57C7.22 7.73 9.41 5.99 12 5.99z"/>
            </svg>
          </button>
          <button type="button" class="login-modal__social-btn" data-login-provider="facebook" aria-label="Facebook">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path fill="#1877F2" d="M24 12a12 12 0 1 0-13.88 11.85v-8.39H7.08V12h3.04V9.36c0-3 1.79-4.66 4.53-4.66 1.31 0 2.68.24 2.68.24v2.95h-1.51c-1.49 0-1.95.93-1.95 1.88V12h3.33l-.53 3.46h-2.8v8.39A12 12 0 0 0 24 12z"/>
            </svg>
          </button>
          <button type="button" class="login-modal__social-btn" data-login-provider="apple" aria-label="Apple">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path fill="#111" d="M16.36 12.77c.02 2.06 1.8 2.74 1.82 2.75-.02.05-.28.96-.92 1.9-.56.81-1.14 1.62-2.06 1.64-.9.02-1.2-.53-2.23-.53-1.03 0-1.36.51-2.2.55-.88.03-1.56-.88-2.12-1.69-1.15-1.66-2.02-4.69-.84-6.74.58-1.01 1.62-1.65 2.75-1.67.86-.02 1.67.58 2.2.58.52 0 1.49-.72 2.52-.62.43.02 1.65.17 2.44 1.34-.06.04-1.45.84-1.43 2.49zm-2.02-5.39c.46-.55.78-1.31.69-2.07-.66.03-1.45.44-1.92.99-.43.5-.81 1.27-.71 2.02.73.06 1.47-.37 1.94-.94z"/>
            </svg>
          </button>
        </div>
        <p class="login-modal__legal">
          <span data-i18n="login.legalPrefix"></span>
          <a class="login-modal__legal-link" href="/ko/terms/" data-i18n="login.terms"></a>
          <span>&nbsp;&amp;&nbsp;</span>
          <a class="login-modal__legal-link" href="/ko/privacy/" data-i18n="login.privacy"></a>
          <span>.</span>
        </p>
        <p class="login-modal__status" data-login-modal-status></p>
      </section>
    </div>
    <footer class="site-footer">
      <div class="site-footer__inner">
        <ul class="footer-nav" aria-label="Footer Menu">
          <li><a class="footer-nav__link" data-footer-link="about" data-i18n="common.footerAbout" href="../about/"></a></li>
          <li><a class="footer-nav__link" data-footer-link="terms" data-i18n="common.footerTerms" href="../terms/"></a></li>
          <li><a class="footer-nav__link" data-footer-link="privacy" data-i18n="common.footerPrivacy" href="../privacy/"></a></li>
          <li><a class="footer-nav__link" data-footer-link="support" data-i18n="common.footerSupport" href="../support/"></a></li>
        </ul>
        <p class="site-footer__text" data-i18n="common.copyright"></p>
      </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../../../script.js"></script>
  </body>
</html>
